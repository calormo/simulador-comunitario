<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Alarma VigicomNET</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Inter', sans-serif;
    background: #f0f2f5;
  }

  .simulator-shell {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    background: #f0f2f5;
    overflow: hidden;
  }

  .phone-frame {
    max-width: 420px;
    width: min(420px, 100%);
    height: min(640px, calc(100vh - 120px));
    height: min(640px, calc(100dvh - 120px));
    min-height: 430px;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    border: 12px solid #111827;
    border-radius: 38px;
    box-shadow:
      0 22px 60px rgba(17,24,39,.28),
      inset 0 0 0 1px rgba(255,255,255,.08);
  }

  .phone-frame::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 50%;
    width: 86px;
    height: 8px;
    border-radius: 999px;
    background: #0b1220;
    transform: translateX(-50%);
    z-index: 30;
  }

  .phone-frame::after {
    content: "";
    position: absolute;
    bottom: 10px;
    left: 50%;
    width: 116px;
    height: 5px;
    border-radius: 999px;
    background: rgba(17,24,39,.35);
    transform: translateX(-50%);
    z-index: 30;
  }

  .phone-frame button {
    appearance: none;
    -webkit-appearance: none;
    font: inherit;
    min-width: 0;
  }

  /* ── Header ── */
  .header {
    background: #1a3a7a;
    padding: 24px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header h1 {
    color: #fff;
    font-size: clamp(1.05rem, 5vw, 1.35rem);
    font-weight: 800;
    letter-spacing: .3px;
  }
  .header-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .header-dots {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .header-dots span {
    width: 5px; height: 5px;
    background: #fff;
    border-radius: 50%;
  }
  .mute-btn {
    width: 30px;
    height: 30px;
    border: 1px solid rgba(255,255,255,.55);
    border-radius: 50%;
    background: rgba(255,255,255,.14);
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: background .2s ease, transform .1s ease;
  }
  .mute-btn:active {
    transform: scale(.92);
  }
  .mute-btn:hover {
    background: rgba(255,255,255,.24);
  }
  .mute-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }
  .mute-btn .icon-muted { display: none; }
  .mute-btn.muted .icon-volume { display: none; }
  .mute-btn.muted .icon-muted { display: block; }

  /* ── Main area (panic button) ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #fff;
    transition: filter .3s ease;
  }
  .main-area.dimmed { filter: brightness(.55); }

  .panic-btn {
    width: clamp(165px, 52vw, 220px);
    height: clamp(165px, 52vw, 220px);
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #f05050, #c62828 70%);
    border: 10px solid #ffffff;
    box-shadow:
      0 0 0 6px #e53935,
      0 8px 30px rgba(198,40,40,.45);
    cursor: pointer;
    position: relative;
    transition: transform .12s ease, box-shadow .12s ease;
    -webkit-user-select: none;
    user-select: none;
  }
  .panic-btn:active {
    transform: scale(.94);
    box-shadow:
      0 0 0 4px #e53935,
      0 2px 10px rgba(198,40,40,.35);
  }

  /* ── Open menu trigger (arrow at bottom) ── */
  .open-menu-btn {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 48px;
    background: #f5f5f5;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid #e0e0e0;
    z-index: 15;
    transition: opacity .3s ease;
  }
  .open-menu-btn.hidden { opacity: 0; pointer-events: none; }
  .open-menu-btn svg {
    width: 28px; height: 28px;
    fill: #1a3a7a;
    transition: transform .2s ease;
  }
  .open-menu-btn:hover svg { transform: translateY(-3px); }

  /* ── Bottom sheet (categories) ── */
  .bottom-sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: #fff;
    border-radius: 22px 22px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.18);
    padding: 6px 12px 22px;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.4,.0,.2,1);
    z-index: 20;
  }
  .bottom-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 44px;
    height: 34px;
    border: none;
    background: transparent;
    margin: 0 auto 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sheet-handle svg {
    width: 30px;
    height: 30px;
    fill: #1a3a7a;
    transition: transform .2s ease;
  }
  .sheet-handle:hover svg { transform: translateY(3px); }

  .icons-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(8px, 3%, 16px);
    justify-items: center;
    min-width: 0;
  }

  .icon-btn {
    width: min(90px, 100%);
    aspect-ratio: 1;
    height: auto;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    padding: 0;
    background: transparent;
    transition: transform .1s ease, box-shadow .1s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .icon-btn:active {
    transform: scale(.9);
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .icon-btn img {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 14px;
    object-fit: cover;
    pointer-events: none;
  }

  .icon-label {
    font-size: clamp(.62rem, 2.6vw, .72rem);
    color: #333;
    text-align: center;
    margin-top: 5px;
    font-weight: 600;
  }

  .icon-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    min-width: 0;
  }

  /* ── Playing indicator ── */
  .playing-indicator {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a3a7a;
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: .85rem;
    font-weight: 700;
    z-index: 100;
    opacity: 0;
    transition: opacity .3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .playing-indicator.visible { opacity: 1; }

  /* ripple */
  @keyframes ripple {
    0% { box-shadow: 0 0 0 0 rgba(229,57,53,.5); }
    100% { box-shadow: 0 0 0 30px rgba(229,57,53,0); }
  }
  .panic-btn.pulse { animation: ripple .6s ease-out; }

  @media (min-width: 768px) {
    .simulator-shell {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 16px;
    }

    .phone-frame {
      height: min(820px, calc(100vh - 32px));
      height: min(820px, calc(100dvh - 32px));
    }
  }
</style>
</head>
<body>

<div class="simulator-shell">
<div class="phone-frame">

  <!-- Header -->
  <div class="header">
    <h1>Alarma VigicomNET</h1>
    <div class="header-actions">
      <div class="header-dots"><span></span><span></span><span></span></div>
      <button class="mute-btn" id="muteBtn" type="button" aria-label="Silenciar sonido">
        <svg class="icon-volume" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <svg class="icon-muted" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M16.5 12c0-1.77-1-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.62 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73L16.25 17.5c-.67.52-1.43.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main area with panic button -->
  <div class="main-area" id="mainArea">
    <div class="panic-btn" id="panicBtn" role="button" tabindex="0" aria-label="Botón de pánico"></div>

    <!-- Arrow button to open menu -->
    <button class="open-menu-btn" id="openMenuBtn" aria-label="Abrir menú de categorías">
      <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
    </button>
  </div>

  <!-- Playing indicator -->
  <div class="playing-indicator" id="playingIndicator">▶ Reproduciendo...</div>

  <!-- Bottom sheet with category icons -->
  <div class="bottom-sheet" id="bottomSheet">
    <button class="sheet-handle" id="sheetHandle" type="button" aria-label="Cerrar menú de categorías">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
    </button>
    <div class="icons-grid">

      <div class="icon-cell">
        <button class="icon-btn" data-sound="audio2" aria-label="Alerta Médica">
          <img src="https://tecnocomingenieriasas.com/wp-content/uploads/2025/07/Icono-Medico-copia.png" alt="Alerta Médica">
        </button>
        <div class="icon-label">Médico</div>
      </div>

      <div class="icon-cell">
        <button class="icon-btn" data-sound="audio3" aria-label="Alerta Incendio">
          <img src="https://tecnocomingenieriasas.com/wp-content/uploads/2025/07/Icono-Incendio.png" alt="Alerta Incendio">
        </button>
        <div class="icon-label">Incendio</div>
      </div>

      <div class="icon-cell">
        <button class="icon-btn" data-sound="audio7" aria-label="Prueba Sirenas">
          <img src="https://tecnocomingenieriasas.com/wp-content/uploads/2025/07/Icono-prueba-Sirena-e1753809627601.png" alt="Prueba Sirenas">
        </button>
        <div class="icon-label">Prueba Sirena</div>
      </div>

      <div class="icon-cell">
        <button class="icon-btn" data-sound="audio4" aria-label="Alerta Accidente">
          <img src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/Icono-Accidente.png" alt="Alerta Accidente">
        </button>
        <div class="icon-label">Accidente</div>
      </div>

      <div class="icon-cell">
        <button class="icon-btn" data-sound="audio5" aria-label="Alerta Agresión">
          <img src="https://tecnocomingenieriasas.com/wp-content/uploads/2025/07/Icono-Agresion.png" alt="Alerta Agresión">
        </button>
        <div class="icon-label">Agresión</div>
      </div>

      <div class="icon-cell">
        <button class="icon-btn" data-sound="audio6" aria-label="Alerta Sospechoso">
          <img src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/Icono-Sospechoso.png" alt="Alerta Sospechoso">
        </button>
        <div class="icon-label">Sospechoso</div>
      </div>

    </div>
  </div>

</div>
</div>

<!-- Preloaded audio elements for reliable playback -->
<audio id="audio1" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/001.mp3" type="audio/mpeg">
</audio>
<audio id="audio2" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/002.mp3" type="audio/mpeg">
</audio>
<audio id="audio3" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/003.mp3" type="audio/mpeg">
</audio>
<audio id="audio4" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/004.mp3" type="audio/mpeg">
</audio>
<audio id="audio5" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/005.mp3" type="audio/mpeg">
</audio>
<audio id="audio6" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/006.mp3" type="audio/mpeg">
</audio>
<audio id="audio7" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/007.mp3" type="audio/mpeg">
</audio>
<audio id="audio8" preload="auto">
  <source src="https://tecnocomingenieriasas.com/wp-content/uploads/2026/05/008.mp3" type="audio/mpeg">
</audio>





<script>
  const panicBtn     = document.getElementById('panicBtn');
  const bottomSheet  = document.getElementById('bottomSheet');
  const mainArea     = document.getElementById('mainArea');
  const indicator    = document.getElementById('playingIndicator');
  const openMenuBtn  = document.getElementById('openMenuBtn');
  const sheetHandle  = document.getElementById('sheetHandle');
  const muteBtn      = document.getElementById('muteBtn');

  let currentAudio = null;
  let hideTimeout = null;

  function stopCurrentSound() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
    indicator.classList.remove('visible');
    if (hideTimeout) clearTimeout(hideTimeout);
    muteBtn.classList.add('muted');
    muteBtn.setAttribute('aria-label', 'Sonido silenciado');
  }

  // ── Helper: play a sound by audio element id ──
  function playSound(audioId, label) {
    const audioEl = document.getElementById(audioId);
    if (!audioEl) return;

    // Stop any currently playing audio
    if (currentAudio && currentAudio !== audioEl) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
    if (currentAudio === audioEl) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }

    currentAudio = audioEl;
    muteBtn.classList.remove('muted');
    muteBtn.setAttribute('aria-label', 'Silenciar sonido');

    indicator.textContent = '▶ ' + (label || 'Reproduciendo...');
    indicator.classList.add('visible');

    audioEl.play().catch(err => {
      console.warn('Audio playback failed:', err);
      indicator.textContent = '⚠ Error al reproducir';
    });

    if (hideTimeout) clearTimeout(hideTimeout);

    audioEl.onended = () => {
      indicator.classList.remove('visible');
      currentAudio = null;
      muteBtn.classList.add('muted');
      muteBtn.setAttribute('aria-label', 'Sonido silenciado');
    };

    hideTimeout = setTimeout(() => {
      indicator.classList.remove('visible');
    }, 60000);
  }

  // ── 1) Panic button plays sound 001 ──
  panicBtn.addEventListener('click', () => {
    panicBtn.classList.add('pulse');
    setTimeout(() => panicBtn.classList.remove('pulse'), 600);
    playSound('audio1', 'ALARMA ACTIVADA');
  });

  // ── 2a) Arrow button at bottom opens the menu ──
  openMenuBtn.addEventListener('click', () => {
    bottomSheet.classList.add('open');
    mainArea.classList.add('dimmed');
    openMenuBtn.classList.add('hidden');
  });

  // ── 2b) Handle bar at top of sheet closes the menu ──
  sheetHandle.addEventListener('click', () => {
    bottomSheet.classList.remove('open');
    mainArea.classList.remove('dimmed');
    openMenuBtn.classList.remove('hidden');
  });

  // ── 2c) Volume button stops the current sound ──
  muteBtn.addEventListener('click', stopCurrentSound);

  // ── 3) Icon buttons play their respective sounds ──
  document.querySelectorAll('.icon-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const audioId = btn.dataset.sound;
      const label = btn.getAttribute('aria-label') || 'Reproduciendo...';
      if (!audioId) return;
      playSound(audioId, label);
    });
  });
</script>

</body>
</html>
